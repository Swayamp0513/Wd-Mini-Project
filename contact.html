<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  margin:0;
}

header{
  background:#ff5722;
  padding:15px;
  text-align:center;
}

header a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-size:18px;
}

.container{
  width:400px;
  margin:50px auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  background:#ff5722;
  color:white;
  border:none;
  border-radius:5px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#e64a19;
}

</style>
</head>

<body>

<header>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</header>

<div class="container">

  <h1>Contact Us</h1>

  <form>
    <input type="text" placeholder="Enter your name">

    <input type="email" placeholder="Enter your email">

    <textarea rows="5" placeholder="Enter your message"></textarea>

    <button type="submit">Send Message</button>
  </form>

</div>

</body>
</html>
